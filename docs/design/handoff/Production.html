<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Myika · Production Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="production/tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { background: var(--color-bg-base); overflow: hidden; }
  /* Canvas chrome — readable on the dark canvas */
  .design-canvas h2[contenteditable] { color: var(--color-text-primary) !important; }
  /* Section title + subtitle (rendered by DCSection as inline divs) */
  .design-canvas [data-dc-slot] ~ * { /* no-op anchor */ }
  /* Re-skin the canvas label/title/subtitle text */
  .design-canvas .dc-labelrow,
  .design-canvas .dc-labelrow .dc-labeltext div,
  .design-canvas .dc-labeltext { color: var(--color-text-secondary) !important; }
  .design-canvas .dc-grip { color: var(--color-text-muted); }
  .design-canvas .dc-grip:hover { background: rgba(255,255,255,0.06) !important; }
  .design-canvas .dc-labeltext:hover { background: rgba(255,255,255,0.04) !important; }
  .design-canvas .dc-expand { color: var(--color-text-muted) !important; }
  .design-canvas .dc-expand:hover { background: rgba(255,255,255,0.06) !important; color: var(--color-text-primary) !important; }
  /* Section header text (28px / 16px headings rendered inline) */
  .design-canvas > div > div > div > div > div[style*="font-size: 28px"],
  .design-canvas div[style*="font-size: 28px"] { color: var(--color-text-primary) !important; }
  .design-canvas div[style*="font-size: 16px"][style*="rgba(60,50,40"] { color: var(--color-text-secondary) !important; }
  /* Editable focus state */
  .design-canvas .dc-editable:focus { background: var(--color-bg-elevated) !important; box-shadow: 0 0 0 1.5px var(--color-accent-default) !important; color: var(--color-text-primary) !important; }
  /* Artboard cards — neutral border, no white bg bleed */
  .design-canvas .dc-card { background: var(--color-bg-base) !important; box-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.5) !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="production/primitives.jsx"></script>
<script type="text/babel" src="production/layout-e.jsx"></script>
<script type="text/babel" src="production/surfaces.jsx"></script>
<script type="text/babel">
function Section({ id, title, subtitle, children }) {
  return (
    <DCSection id={id} title={title} subtitle={subtitle}>{children}</DCSection>
  );
}

function App() {
  return (
    <DesignCanvas bg="#0A0A0A">
      <Section id="intro" title="Myika · Production Screens" subtitle="Dark-mode production pass. Every value comes from DESIGN_SYSTEM.md. Structural decisions locked from wireframe Layout E.">
        <DCArtboard id="readme" label="Read me" width={680} height={340}>
          <div style={{ padding: 'var(--space-8)', fontFamily: 'var(--font-ui)', height: '100%', boxSizing: 'border-box' }}>
            <div className="t-display c-primary">Myika · production</div>
            <div className="t-body-lg c-secondary" style={{ marginTop: 'var(--space-3)' }}>
              Reference renders for the V1 client. Source of truth is <span className="mono t-mono c-accent">DESIGN_SYSTEM.md</span>.
            </div>
            <div style={{ marginTop: 'var(--space-5)', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 'var(--space-3)' }}>
              <div><div className="t-mono-sm c-muted">§ Main window</div><div className="t-body-sm c-primary">Layout E · 6 states</div></div>
              <div><div className="t-mono-sm c-muted">§ Settings</div><div className="t-body-sm c-primary">5 sections</div></div>
              <div><div className="t-mono-sm c-muted">§ Modals</div><div className="t-body-sm c-primary">Permission · Bridge · Rollback</div></div>
              <div><div className="t-mono-sm c-muted">§ Onboarding</div><div className="t-body-sm c-primary">4 steps</div></div>
              <div><div className="t-mono-sm c-muted">§ Plan expanded</div><div className="t-body-sm c-primary">Default + dry-run</div></div>
              <div><div className="t-mono-sm c-muted">§ Errors</div><div className="t-body-sm c-primary">Tool failure inline</div></div>
            </div>
          </div>
        </DCArtboard>
      </Section>

      <Section id="layout-e" title="Main window · Layout E" subtitle="All 6 states. 1280×820.">
        <DCArtboard id="le-empty" label="1 · Empty / welcome" width={LE_W} height={LE_H}><StateEmpty /></DCArtboard>
        <DCArtboard id="le-mid" label="2 · Mid-conversation" width={LE_W} height={LE_H}><StateMid /></DCArtboard>
        <DCArtboard id="le-expanded" label="3 · Tool call expanded" width={LE_W} height={LE_H}><StateExpanded /></DCArtboard>
        <DCArtboard id="le-plan" label="4 · Plan review" width={LE_W} height={LE_H}><StatePlan /></DCArtboard>
        <DCArtboard id="le-streaming" label="5 · Streaming" width={LE_W} height={LE_H}><StateStreaming /></DCArtboard>
        <DCArtboard id="le-disconnected" label="6 · Disconnected" width={LE_W} height={LE_H}><StateDisconnected /></DCArtboard>
      </Section>

      <Section id="settings" title="Settings · 5 sections" subtitle="Full window. 960×720.">
        <DCArtboard id="s-model" label="Model & API" width={SET_W} height={SET_H}><Settings section="model" /></DCArtboard>
        <DCArtboard id="s-bridge" label="Unreal bridge" width={SET_W} height={SET_H}><Settings section="bridge" /></DCArtboard>
        <DCArtboard id="s-perms" label="Tool permissions" width={SET_W} height={SET_H}><Settings section="perms" /></DCArtboard>
        <DCArtboard id="s-keys" label="Keybindings" width={SET_W} height={SET_H}><Settings section="keys" /></DCArtboard>
        <DCArtboard id="s-theme" label="Theme" width={SET_W} height={SET_H}><Settings section="theme" /></DCArtboard>
      </Section>

      <Section id="perm" title="Tool permission modal" subtitle="Signature trust moment.">
        <DCArtboard id="pm-default" label="Default" width={560} height={500}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}>
            <PermissionModal />
          </div>
        </DCArtboard>
        <DCArtboard id="pm-context" label="In-context (chat dimmed)" width={LE_W} height={LE_H}>
          <div style={{ position: 'relative', width: '100%', height: '100%' }}>
            <StateMid />
            <div style={{ position: 'absolute', inset: 0, background: 'var(--color-bg-overlay)', backdropFilter: 'blur(2px)' }} />
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <PermissionModal />
            </div>
          </div>
        </DCArtboard>
      </Section>

      <Section id="plan-expanded" title="Plan approval · expanded" subtitle="Default + dry-run preview.">
        <DCArtboard id="px-default" label="Default · 4 of 5 selected" width={640} height={520}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}>
            <PlanExpanded />
          </div>
        </DCArtboard>
        <DCArtboard id="px-dryrun" label="Dry-run preview" width={640} height={520}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}>
            <PlanExpanded dryRun />
          </div>
        </DCArtboard>
      </Section>

      <Section id="onboarding" title="Onboarding · 4 steps" subtitle="Same card shell across steps.">
        <DCArtboard id="ob-1" label="Step 1 · Welcome" width={640} height={500}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}><OnbWelcome /></div>
        </DCArtboard>
        <DCArtboard id="ob-2" label="Step 2 · API key" width={640} height={500}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}><OnbKey /></div>
        </DCArtboard>
        <DCArtboard id="ob-3a" label="Step 3 · Plugin · waiting" width={640} height={500}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}><OnbPlugin connected={false} /></div>
        </DCArtboard>
        <DCArtboard id="ob-3b" label="Step 3 · Plugin · connected" width={640} height={500}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}><OnbPlugin connected /></div>
        </DCArtboard>
        <DCArtboard id="ob-4" label="Step 4 · Done" width={640} height={500}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}><OnbDone /></div>
        </DCArtboard>
      </Section>

      <Section id="errors" title="Error + recovery" subtitle="Inline failure, bridge lost, rollback confirm.">
        <DCArtboard id="er-tool" label="Tool failure · inline" width={640} height={320}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}><ToolFailure /></div>
        </DCArtboard>
        <DCArtboard id="er-bridge" label="Bridge lost mid-run" width={560} height={480}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}><BridgeLost /></div>
        </DCArtboard>
        <DCArtboard id="er-rollback" label="Rollback confirm" width={560} height={500}>
          <div style={{ padding: 'var(--space-6)', display: 'flex', justifyContent: 'center' }}><Rollback /></div>
        </DCArtboard>
      </Section>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
